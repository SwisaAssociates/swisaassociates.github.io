<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

html{
scroll-behavior:smooth;
}

body{
background:#020617;
color:#fff;
animation: pageLoad 0.8s ease-out;
}

@keyframes pageLoad{
0%{
opacity:0;
transform:translateY(25px);
filter:blur(6px);
}
100%{
opacity:1;
transform:translateY(0);
filter:blur(0);
}
}

/* HERO */
.hero{
position:relative;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

.bg-img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(1.12) contrast(1.08) saturate(1.15);
transform:scale(1.03);
}

.hero::after{
content:"";
position:absolute;
inset:0;
z-index:-1;
background:linear-gradient(120deg,rgba(0,0,0,0.55),rgba(0,0,0,0.25),rgba(0,0,0,0.6));
}

/* NAVBAR */
.navbar{
width:100%;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,20,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:fixed;
top:0;
left:0;
z-index:999;
transition:0.4s ease;
}

.navbar.sticky{
background:rgba(10,10,20,0.95);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.navbar a{
margin:0 10px;
color:#fff;
text-decoration:none;
font-size:14px;
padding:8px 12px;
border-radius:8px;
transition:.25s;
}

.navbar a:hover{
background:rgba(59,130,246,0.3);
}

/* HERO CONTENT */
.hero-content{
flex:1;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
margin-top:80px;
}

.text{
max-width:650px;
}

.text h1{
font-size:56px;
line-height:1.2;
margin-bottom:10px;
}

.text p{
font-size:18px;
opacity:.95;
margin-bottom:25px;
}

/* BUTTON */
.btn{
display:inline-block;
background:linear-gradient(135deg,#3b82f6,#6366f1);
padding:14px 28px;
border-radius:12px;
color:#fff;
text-decoration:none;
transition:.3s ease;
box-shadow:0 10px 25px rgba(59,130,246,0.25);
position:relative;
overflow:hidden;
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent);
transition:0.5s;
}

.btn:hover::before{
left:100%;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(59,130,246,0.4);
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:16px;
width:340px;
}

/* SECTIONS */
section{
padding:90px 60px;
}

.container{
max-width:1100px;
margin:auto;
}

h2{
font-size:34px;
margin-bottom:10px;
}

.sub{
color:#94a3b8;
margin-bottom:25px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:14px;
transition:0.6s ease;
opacity:0;
transform:translateY(40px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-6px);
}

/* STATS */
.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.stat-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
padding:35px;
border-radius:16px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:0.6s ease;
}

.stat-card.show{
opacity:1;
transform:translateY(0);
}

.counter{
font-size:42px;
color:#3b82f6;
font-weight:700;
}

/* CTA */
.cta{
background:rgba(255,255,255,0.08);
padding:60px;
border-radius:16px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:0.6s ease;
}

.cta.show{
opacity:1;
transform:translateY(0);
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
color:#94a3b8;
}

@media(max-width:900px){
.hero-content{
flex-direction:column;
text-align:center;
gap:30px;
}

.text h1{
font-size:38px;
}

.glass{
width:100%;
}
}
</style>
